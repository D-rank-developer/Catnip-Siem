<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<title>OmniLog system architecture</title>
<desc>OmniLog architecture showing UI, API, log generator, Graylog, ML service, and storage layers connected by data flow arrows.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
  text { font-size: 14px; fill: #0C447C; }
  .sub { font-size: 12px; }
  .label { fill: #5F5E5A; font-size: 12px; }
  @media (prefers-color-scheme: dark) {
    .arr { stroke: #B4B2A9; }
  }
</style>
</defs>

<!-- Tier 1: UI (blue) -->
<rect x="260" y="40" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="68" text-anchor="middle" font-weight="500" fill="#0C447C">OmniLog UI</text>
<text x="340" y="86" text-anchor="middle" class="sub" fill="#185FA5">React + Vite · :5173</text>

<!-- Arrow UI -> API -->
<line x1="340" y1="96" x2="340" y2="148" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="128" class="label">/omnilog-api</text>

<!-- Tier 2: API (teal) -->
<rect x="260" y="150" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="178" text-anchor="middle" font-weight="500" fill="#085041">OmniLog API</text>
<text x="340" y="196" text-anchor="middle" class="sub" fill="#0F6E56">Flask · :5002</text>

<!-- API branches -->
<path d="M 340 206 L 340 240 L 200 240 L 200 288" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 340 206 L 340 240 L 540 240 L 540 288" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Tier 3: Log Generator (amber) -->
<rect x="40" y="290" width="160" height="72" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="120" y="318" text-anchor="middle" font-weight="500" fill="#633806">Log generator</text>
<text x="120" y="338" text-anchor="middle" class="sub" fill="#854F0B">Python · GELF TCP</text>
<text x="120" y="354" text-anchor="middle" class="sub" fill="#854F0B">→ :12201</text>

<!-- Tier 3: Graylog (coral) -->
<rect x="260" y="290" width="160" height="72" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="318" text-anchor="middle" font-weight="500" fill="#712B13">Graylog 6.1</text>
<text x="340" y="338" text-anchor="middle" class="sub" fill="#993C1D">:9000 HTTP · :12201 GELF</text>
<text x="340" y="354" text-anchor="middle" class="sub" fill="#993C1D">:1514 syslog</text>

<!-- Tier 3: ML Service (pink) -->
<rect x="480" y="290" width="160" height="72" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="560" y="318" text-anchor="middle" font-weight="500" fill="#72243E">ML service</text>
<text x="560" y="338" text-anchor="middle" class="sub" fill="#993556">Flask · :5001</text>
<text x="560" y="354" text-anchor="middle" class="sub" fill="#993556">Severity + zero-day</text>

<!-- Log Generator -> Graylog -->
<line x1="200" y1="326" x2="252" y2="326" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Graylog -> OpenSearch -->
<line x1="300" y1="362" x2="220" y2="450" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="200" y="412" text-anchor="end" class="label">OpenSearch</text>

<!-- Graylog -> MongoDB (dashed) -->
<line x1="380" y1="362" x2="460" y2="450" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="480" y="412" class="label">config</text>

<!-- Tier 4: OpenSearch (purple) -->
<rect x="100" y="450" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="200" y="478" text-anchor="middle" font-weight="500" fill="#3C3489">OpenSearch 2.15</text>
<text x="200" y="496" text-anchor="middle" class="sub" fill="#534AB7">Log storage</text>

<!-- Tier 4: MongoDB (gray) -->
<rect x="380" y="450" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="480" y="478" text-anchor="middle" font-weight="500" fill="#444441">MongoDB 7</text>
<text x="480" y="496" text-anchor="middle" class="sub" fill="#5F5E5A">Graylog config</text>

<!-- Legend -->
<g transform="translate(40, 555)">
<line x1="0" y1="8" x2="28" y2="8" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="36" y="12" class="label">Data flow</text>
<line x1="140" y1="8" x2="168" y2="8" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="176" y="12" class="label">Configuration</text>
</g>
</svg>
